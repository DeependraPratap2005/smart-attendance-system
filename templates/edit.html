<!DOCTYPE html>
<html>
<head>
<title>Edit Student - Final V2</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
color:white;
padding:20px;
}

.box{
width:100%;
max-width:520px;
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:20px;
box-shadow:0 12px 30px rgba(0,0,0,.25);
backdrop-filter:blur(10px);
}

h2{
text-align:center;
margin-bottom:22px;
font-size:30px;
font-weight:700;
}

label{
display:block;
margin:10px 0 6px;
font-size:14px;
font-weight:500;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
outline:none;
margin-bottom:8px;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:18px;
}

.full{
grid-column:1/3;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
font-weight:600;
font-size:15px;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
}

.green{background:#16a34a;}
.red{background:#dc2626;}
.blue{background:#2563eb;}
.orange{background:#ea580c;}
.purple{background:#7c3aed;}

a{
text-decoration:none;
}

@media(max-width:600px){
.actions{
grid-template-columns:1fr;
}
.full{
grid-column:auto;
}
}
</style>
</head>

<body>

<div class="box">

<h2>✏ Edit Student</h2>

<form method="POST" action="/update/{{ student[0] }}">

<label>Student Name</label>
<input type="text" name="name" value="{{ student[1] }}" required>

<label>UID</label>
<input type="text" name="uid" value="{{ student[2] }}" required>

<label>Course</label>
<input type="text" name="course" value="{{ student[3] }}" required>

<label>Parent Email</label>
<input type="email" name="email" value="{{ student[4] }}">

<label>Parent Phone</label>
<input type="text" name="phone" value="{{ student[5] }}">

<div class="actions">

<button class="green full" type="submit">Update Student</button>

<a href="/add_face/{{ student[0] }}">
<button type="button" class="blue">Add Face</button>
</a>

<a href="/remove_face/{{ student[0] }}">
<button type="button" class="purple">Remove Face</button>
</a>

<a href="/admin" class="full">
<button type="button" class="red">Back to Dashboard</button>
</a>

</div>

</form>

</div>

</body>
</html>
