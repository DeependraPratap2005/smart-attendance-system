<!DOCTYPE html>
<html>
<head>
<title>Smart Attendance Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
overflow:hidden;
}

body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:rgba(59,130,246,0.25);
border-radius:50%;
top:-120px;
left:-120px;
filter:blur(90px);
}

body::after{
content:'';
position:absolute;
width:500px;
height:500px;
background:rgba(16,185,129,0.22);
border-radius:50%;
bottom:-120px;
right:-120px;
filter:blur(90px);
}

.box{
position:relative;
z-index:2;
width:380px;
padding:32px;
border-radius:22px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
box-shadow:0 20px 40px rgba(0,0,0,0.35);
color:white;
}

h1{
text-align:center;
font-size:28px;
margin-bottom:8px;
font-weight:700;
}

.sub{
text-align:center;
font-size:14px;
opacity:0.8;
margin-bottom:22px;
}

input,select{
width:100%;
padding:13px;
margin:10px 0;
border:none;
outline:none;
border-radius:12px;
font-size:14px;
}

button{
width:100%;
padding:13px;
margin-top:12px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:700;
font-size:15px;
color:white;
background:linear-gradient(45deg,#2563eb,#06b6d4);
transition:0.3s;
}

button:hover{
transform:translateY(-2px) scale(1.02);
}

.error{
background:#dc2626;
padding:10px;
border-radius:10px;
font-size:14px;
margin-bottom:10px;
text-align:center;
}

.note{
margin-top:16px;
font-size:12px;
opacity:0.75;
text-align:center;
line-height:1.5;
}
</style>
</head>

<body>

<div class="box">

<h1>🎓 Smart Attendance</h1>
<div class="sub">Premium Secure Login</div>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST">

<input type="text" name="user" placeholder="Enter Admin Email / Student UID" required>

<input type="password" name="pass" placeholder="Enter Password" required>

<select name="role" required>
<option value="">Select Role</option>
<option value="admin">Admin</option>
<option value="student">Student</option>
</select>

<button type="submit">Login</button>

</form>

<div class="note">
Admin Login: admin@gmail.com / 1234<br>
Student Login: UID as Username & UID as Password
</div>

</div>

</body>
</html>
